workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        # gradle-wrapper.jar corrompido no repo — baixar Gradle 8.9 e chamar direto
        script: |
          set -e
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip \
               -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.9/bin/gradle androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build (AltStore / Físico)
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Build shared KMP XCFramework
        # gradle-wrapper.jar está corrompido no repo.
        # Baixamos o Gradle 8.9 e chamamos o binário diretamente (sem ./gradlew).
        script: |
          set -e
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip \
               -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.9/bin/gradle :shared:assembleSharedDebugXCFramework

      - name: Copiar XCFramework para pasta iosApp
        # O project.pbxproj aponta para iosApp/Shared.xcframework ($(PROJECT_DIR))
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== Estrutura do XCFramework copiado ==="
          ls -R "$XCFW_DST"

      - name: Build iOS .app para dispositivo real
        script: |
          set -e

          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Build concluído com sucesso ==="
          ls -la build/ios/Build/Products/Debug-iphoneos/

      - name: Empacotar .ipa para AltStore
        script: |
          mkdir -p /tmp/Payload
          cp -R build/ios/Build/Products/Debug-iphoneos/RayearthGames.app /tmp/Payload/
          cd /tmp
          zip -r RayearthGames.ipa Payload/
          cp RayearthGames.ipa $CM_BUILD_DIR/RayearthGames.ipa
          echo "=== IPA pronto para instalação via AltStore ==="

    artifacts:
      - RayearthGames.ipa
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
