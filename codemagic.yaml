workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle --version

      - name: Build shared KMP XCFramework
        script: |
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle :shared:assembleSharedDebugXCFramework

      - name: Copy XCFramework into iosApp folder
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== XCFramework copiado para $XCFW_DST ==="
          ls -la "$XCFW_DST"

     ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle --version

      - name: Configure Gradle Memory & Daemons
        script: |
          # Cria um gradle.properties global para limitar o consumo de RAM e não estourar o Mac Mini
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC" >> ~/.gradle/gradle.properties
          echo "org.gradle.workers.max=2" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "kotlin.daemon.jvm.options=-Xmx2g" >> ~/.gradle/gradle.properties

      - name: Build shared KMP XCFramework
        script: |
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle :shared:assembleSharedDebugXCFramework --no-daemon

      - name: Copy XCFramework into iosApp folder
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== XCFramework copiado para $XCFW_DST ==="
          ls -la "$XCFW_DST"

      - name: Build iOS app
        script: |
          # Desabilita o build paralelo no Xcode para economizar recursos de hardware
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios \
            -parallelizeTargets NO \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Verificando conteúdo da pasta de produtos ==="
          ls -la build/ios/Build/Products/Debug-iphonesimulator/

      - name: Package .app para Appetize
        script: |
          APP_PATH="build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERRO: O arquivo .app não existe em $APP_PATH"
            exit 1
          fi

          echo "=== Compactando para o Appetize ==="
          cd build/ios/Build/Products/Debug-iphonesimulator/
          zip -r "$CM_BUILD_DIR/RayearthGames.zip" "RayearthGames.app"
          
          echo "=== Verificação do ZIP final ==="
          echo "Local: $CM_BUILD_DIR/RayearthGames.zip"
          echo "Tamanho do ZIP: $(du -sh $CM_BUILD_DIR/RayearthGames.zip)"

    artifacts:
      - RayearthGames.zip
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
