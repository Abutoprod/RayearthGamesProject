workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build (AltStore / Físico)
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle --version

      - name: Build shared KMP XCFramework
        script: |
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle :shared:assembleSharedDebugXCFramework

      - name: Copy XCFramework into iosApp folder
        script: |
          # Garantindo que o framework seja copiado exatamente para dentro da pasta iosApp
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== Verificando local do XCFramework ==="
          ls -la iosApp/

      - name: Build iOS app for Real Device
        script: |
          set -e
          
          # Forçando o caminho absoluto e relativo no arquivo de configuração do Xcode
          echo 'FRAMEWORK_SEARCH_PATHS = $(inherited) "$(PROJECT_DIR)" "$(PROJECT_DIR)/Shared.xcframework" "$(SRCROOT)"' > /tmp/config.xcconfig

          # Executamos o build passando a busca de frameworks TAMBÉM por linha de comando para garantir o Swift
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            -xcconfig /tmp/config.xcconfig \
            FRAMEWORK_SEARCH_PATHS="\$(inherited) \$(PROJECT_DIR) \$(PROJECT_DIR)/.." \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Build concluído — verificando .app de dispositivo ==="
          APP_PATH="build/ios/Build/Products/Debug-iphoneos/RayearthGames.app"
          du -sh "$APP_PATH"

      - name: Package .ipa para AltStore
        script: |
          mkdir -p /tmp/Payload
          cp -R build/ios/Build/Products/Debug-iphoneos/RayearthGames.app /tmp/Payload/
          cd /tmp
          zip -r RayearthGames.ipa Payload/
          cp RayearthGames.ipa $CM_BUILD_DIR/RayearthGames.ipa
          echo "=== IPA está pronto para download ==="

    artifacts:
      - RayearthGames.ipa
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
