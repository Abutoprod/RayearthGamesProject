workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle --version

      - name: Build shared KMP XCFramework
        script: |
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle :shared:assembleSharedDebugXCFramework

      - name: Copy XCFramework into iosApp folder
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== XCFramework copiado ==="
          ls -la "$XCFW_DST"

      - name: Patch project.pbxproj — adicionar FRAMEWORK_SEARCH_PATHS
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          echo "=== Conteudo FRAMEWORK_SEARCH_PATHS antes do patch ==="
          grep -n "FRAMEWORK_SEARCH_PATHS" "$PBXPROJ" || echo "(nenhuma entrada encontrada)"

          # Se já tem FRAMEWORK_SEARCH_PATHS com $(SRCROOT), não faz nada
          if grep -q 'FRAMEWORK_SEARCH_PATHS.*SRCROOT' "$PBXPROJ"; then
            echo "FRAMEWORK_SEARCH_PATHS já contém SRCROOT — nenhum patch necessário"
          else
            # Adiciona $(SRCROOT) a qualquer linha FRAMEWORK_SEARCH_PATHS existente
            if grep -q 'FRAMEWORK_SEARCH_PATHS' "$PBXPROJ"; then
              echo "Adicionando \$(SRCROOT) ao FRAMEWORK_SEARCH_PATHS existente..."
              sed -i '' 's|FRAMEWORK_SEARCH_PATHS = (|FRAMEWORK_SEARCH_PATHS = (\n\t\t\t\t\t"$(SRCROOT)",|g' "$PBXPROJ" 2>/dev/null || \
              sed -i 's|FRAMEWORK_SEARCH_PATHS = (|FRAMEWORK_SEARCH_PATHS = (\n\t\t\t\t\t"$(SRCROOT)",|g' "$PBXPROJ"
            else
              # Não existe FRAMEWORK_SEARCH_PATHS — insere antes de SWIFT_VERSION em cada bloco de build config
              echo "Inserindo FRAMEWORK_SEARCH_PATHS novo..."
              sed -i 's|SWIFT_VERSION = 5\.0;|FRAMEWORK_SEARCH_PATHS = (\n\t\t\t\t\t"$(inherited)",\n\t\t\t\t\t"$(SRCROOT)",\n\t\t\t\t);\n\t\t\t\tSWIFT_VERSION = 5.0;|g' "$PBXPROJ" 2>/dev/null || \
              sed -i 's|SWIFT_VERSION = 5\.0;|FRAMEWORK_SEARCH_PATHS = (\n\t\t\t\t\t"$(inherited)",\n\t\t\t\t\t"$(SRCROOT)",\n\t\t\t\t);\n\t\t\t\tSWIFT_VERSION = 5.0;|g' "$PBXPROJ"
            fi
            echo "=== Conteudo FRAMEWORK_SEARCH_PATHS depois do patch ==="
            grep -n -A3 "FRAMEWORK_SEARCH_PATHS" "$PBXPROJ"
          fi

      - name: Build iOS app
        script: |
          set -e
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            -derivedDataPath build/ios \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Build concluído — verificando .app ==="
          APP_PATH="build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.app"
          du -sh "$APP_PATH"
          ls "$APP_PATH"

      - name: Package .app para Appetize
        script: |
          APP_PATH="build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.app"
          mkdir -p /tmp/Payload
          cp -R "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r RayearthGames.zip Payload/
          cp RayearthGames.zip $CM_BUILD_DIR/RayearthGames.zip
          echo "=== ZIP gerado: $(du -sh $CM_BUILD_DIR/RayearthGames.zip) ==="

    artifacts:
      - RayearthGames.zip
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
