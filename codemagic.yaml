workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build (AltStore / Físico)
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Tornar gradlew executável
        script: |
          chmod +x gradlew

      - name: Build shared KMP XCFramework
        # ATENÇÃO: o nome correto da task é assemble{BuildType}{FrameworkName}XCFramework
        # ou seja: assembleDebugSharedXCFramework (Debug antes do nome do framework)
        script: |
          ./gradlew :shared:assembleDebugSharedXCFramework

      - name: Copiar XCFramework para pasta iosApp
        # O project.pbxproj aponta para iosApp/Shared.xcframework ($(PROJECT_DIR))
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== Estrutura do XCFramework copiado ==="
          ls -R "$XCFW_DST"

      - name: Build iOS .app para dispositivo real
        script: |
          set -e

          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Build concluído com sucesso ==="
          ls -la build/ios/Build/Products/Debug-iphoneos/

      - name: Empacotar .ipa para AltStore
        script: |
          mkdir -p /tmp/Payload
          cp -R build/ios/Build/Products/Debug-iphoneos/RayearthGames.app /tmp/Payload/
          cd /tmp
          zip -r RayearthGames.ipa Payload/
          cp RayearthGames.ipa $CM_BUILD_DIR/RayearthGames.ipa
          echo "=== IPA pronto para instalação via AltStore ==="

    artifacts:
      - RayearthGames.ipa
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
