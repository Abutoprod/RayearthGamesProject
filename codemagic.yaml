workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Set up Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x gradlew
      - name: Build shared KMP framework
        script: |
          ./gradlew :shared:assembleSharedDebugXCFramework
      - name: Copy XCFramework
        script: |
          mkdir -p iosApp/Shared.xcframework
          cp -R shared/build/XCFrameworks/debug/Shared.xcframework iosApp/
      - name: Build iOS
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.2' \
            -derivedDataPath build/ios \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            FRAMEWORK_SEARCH_PATHS="$(pwd)/iosApp"
          du -sh build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.app
          cd build/ios/Build/Products/Debug-iphonesimulator
          zip -r RayearthGames.zip RayearthGames.app
    artifacts:
      - build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.zip
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
