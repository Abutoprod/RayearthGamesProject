workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle --version

      - name: Build shared KMP XCFramework
        script: |
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle :shared:assembleSharedDebugXCFramework

      - name: Copy XCFramework into iosApp folder
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== XCFramework copiado para $XCFW_DST ==="
          ls -la "$XCFW_DST"

      - name: Build iOS app
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "=== Procurando o arquivo .app gerado ==="
          APP_PATH=$(find build/ios -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: Nenhum arquivo .app foi encontrado em build/ios!"
            exit 1
          fi
          
          echo "App encontrado em: $APP_PATH"
          echo "Tamanho do App:"
          du -sh "$APP_PATH"
          echo "$APP_PATH" > /tmp/app_path.txt

      - name: Package .app para Appetize
        script: |
          APP_PATH=$(cat /tmp/app_path.txt)
          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          
          echo "=== Compactando para o Appetize ==="
          cd "$APP_DIR"
          zip -r "$CM_BUILD_DIR/RayearthGames.zip" "$APP_NAME"
          
          echo "=== Verificação do ZIP final ==="
          echo "Local: $CM_BUILD_DIR/RayearthGames.zip"
          echo "Tamanho do ZIP: $(du -sh $CM_BUILD_DIR/RayearthGames.zip)"

    artifacts:
      - RayearthGames.zip
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
