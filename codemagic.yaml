workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

 ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build shared KMP framework
        script: |
          ./gradlew :shared:assembleSharedDebugXCFramework
      - name: Copy XCFramework
        script: |
          mkdir -p iosApp/Shared.xcframework
          cp -R shared/build/XCFrameworks/debug/Shared.xcframework iosApp/
      - name: Build iOS
        script: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
