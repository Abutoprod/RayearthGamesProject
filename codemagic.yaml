workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set up Gradle
        script: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew androidApp:assembleDebug
    artifacts:
      - androidApp/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: 16.2
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle-8.9-bin.zip
          unzip -q /tmp/gradle-8.9-bin.zip -d /tmp/gradle
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle --version

      - name: Build shared KMP XCFramework
        script: |
          export PATH=/tmp/gradle/gradle-8.9/bin:$PATH
          gradle :shared:assembleSharedDebugXCFramework

      - name: Copy XCFramework into iosApp folder
        script: |
          XCFW_SRC="shared/build/XCFrameworks/debug/Shared.xcframework"
          XCFW_DST="iosApp/Shared.xcframework"
          rm -rf "$XCFW_DST"
          cp -R "$XCFW_SRC" "$XCFW_DST"
          echo "=== XCFramework copiado ==="
          ls -la "$XCFW_DST"

      - name: Build iOS app
        script: |
          set -e
          
          # Criando um arquivo de configuração nativo para injetar as buscas de framework com segurança
          echo 'FRAMEWORK_SEARCH_PATHS = $(inherited) "$(PROJECT_DIR)" "$(PROJECT_DIR)/.."' > /tmp/config.xcconfig
          echo "=== Conteúdo do arquivo xcconfig temporário ==="
          cat /tmp/config.xcconfig

          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios \
            -xcconfig /tmp/config.xcconfig \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "=== Build concluído — verificando .app ==="
          APP_PATH="build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.app"
          du -sh "$APP_PATH"
          ls "$APP_PATH"

      - name: Package .app para Appetize
        script: |
          APP_PATH="build/ios/Build/Products/Debug-iphonesimulator/RayearthGames.app"
          cd build/ios/Build/Products/Debug-iphonesimulator
          zip -r RayearthGames.zip RayearthGames.app
          cp RayearthGames.zip $CM_BUILD_DIR/RayearthGames.zip
          echo "=== ZIP gerado com sucesso ==="

    artifacts:
      - RayearthGames.zip
    publishing:
      email:
        recipients:
          - victorconforto@outlook.com
        notify:
          success: true
          failure: true
